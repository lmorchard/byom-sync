<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="folder">
{{template "siteheader" .}}
<input type="checkbox" id="nav-toggle" class="nav-toggle">
<label for="nav-toggle" class="nav-toggle-btn" aria-label="Toggle site navigation"></label>
<div class="layout">
<aside class="sidebar">
<byom-site-nav></byom-site-nav>
<script type="module" src="/assets/site-nav.js"></script>
</aside>
<main>
{{template "crumbs" .}}
<h1>{{.Title}}</h1>
{{if .Intro}}<section class="intro">{{.Intro}}</section>{{end}}
<section class="tree">{{template "treeList" .Node.Children}}</section>
</main>
</div>
{{template "footer" .}}
</body>
</html>
