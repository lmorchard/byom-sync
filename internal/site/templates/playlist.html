<!doctype html>
<html lang="en">
<head>{{template "head" .}}</head>
<body class="playlist">
{{template "siteheader" .}}
<input type="checkbox" id="nav-toggle" class="nav-toggle">
<label for="nav-toggle" class="nav-toggle-btn" aria-label="Toggle site navigation"></label>
<div class="layout">
<aside class="sidebar">
<byom-site-nav></byom-site-nav>
<script type="module" src="/assets/site-nav.js"></script>
</aside>
<main>
{{template "crumbs" .}}
{{template "player" .}}
<noscript>
  <h1>{{.Title}}</h1>
  <ol class="tracklist">{{range .Playlist.Tracks}}<li>{{.Title}} — {{.Artist}}</li>{{end}}</ol>
</noscript>
</main>
</div>
{{template "footer" .}}
</body>
</html>
