name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build:
    needs: ci
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          COMMIT="${GITHUB_SHA:0:7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X main.version=$VERSION -X main.commit=$COMMIT -X main.date=$BUILD_DATE"

          go build -ldflags "$LDFLAGS" -o byom-sync${{ matrix.goos == 'windows' && '.exe' || '' }}

      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar czf byom-sync-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz byom-sync

      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: |
          7z a byom-sync-${{ matrix.goos }}-${{ matrix.goarch }}.zip byom-sync.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: byom-sync-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            byom-sync-*.tar.gz
            byom-sync-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Generate checksums
        run: |
          find . -name "byom-sync-*" -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            byom-sync-*/*.tar.gz
            byom-sync-*/*.zip
            checksums.txt
          generate_release_notes: true

